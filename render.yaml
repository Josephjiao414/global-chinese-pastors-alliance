services:
  - type: web
    name: global-chinese-pastors-alliance
    runtime: node
    plan: free
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm build
    startCommand: pnpm start
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: NEXT_PUBLIC_SITE_URL
        sync: false
